<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fine Art Auto Essen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/main.css">
    <script type="module" src="script.js"></script>
</head>

<body>
    <header>
        <div>
            <img src="assets/img/logo.png" style="width: 200px;" alt="logo">
        </div>
        <nav>
            <a href="/">Home</a>
            <a href="/impressum">Impressum</a>
            <a href="/contact">Kontakt</a>
        </nav>
    </header>
    <main>
        <section>
            <div class="container-fluid hero-img">
                <img src="/assets/img/hero.jpg" alt="">
                <img src="/assets/img/hero_light.jpg" class="img-light" alt="">
            </div>
        </section>
        <section>
            <div class="h1-section">
                <h1>
                    Auto-Fotografie in Essen
                </h1>
                <p>
                    Im Herzen des Ruhrgebiets in moderner, künstlerischer Art und Weise, die das Beste aus deinem Auto
                    herausholt. Der Stil passt perfekt zu Oldtimern, Sportwagen oder Alltagswagen.
                </p>
            </div>
        </section>
        <section class="icon-section">
            <div class="icon-table">
                <img src="/assets/icons/wall_art.svg" alt="wall-art-icon">
                <h3>Geeignet für große Wandbilder</h3>
            </div>
            <div class="icon-table">
                <img src="/assets/icons/camera.svg" alt="wall-art-icon">
                <h3>Hohe Qualität</h3>
            </div>
        </section>
        <section>
            <div id="carouselExampleIndicators" class="carousel slide">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0"
                        class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                        aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                        aria-label="Slide 3"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3"
                        aria-label="Slide 4"></button>
                </div>
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="assets/img/1.jpg" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="assets/img/2.jpg" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="assets/img/3.jpg" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="assets/img/4.jpg" class="d-block w-100" alt="...">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </section>
    </main>
    <footer></footer>
</body>

</html>
